# =================================================================
# 自動車保険見積システム フロントエンド Nginx設定ファイル
# =================================================================

server {
    listen 80;
    server_name localhost;

    # -------------------------------------------------------------
    # 1. 静的リソース配信とSPAルーティング
    # 【設計意図】React Router等によるSPA（シングルページアプリケーション）の
    # クライアントサイド・ルーティングに対応するため、物理ファイルが存在しない場合は
    # すべて index.html にフォールバックさせ、404エラーを防ぐ。
    # -------------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------------
    # 2. バックエンドAPIへのリバースプロキシ
    # 【セキュリティとCORS設計】ブラウザからの同一ポート(80)宛ての /api/ リクエストを
    # 同一コンテナネットワーク内のバックエンドコンテナ(8080ポート)へ転送する。
    # これにより、本番環境でのCORS（オリジン間リソース共有）制約を完全に排除する。
    # -------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

